# Supabase project configuration. Generated for barter.game v1.
#
# v1 layout: one Supabase project hosts both demo banks as separate Edge
# Functions (bank-alice, bank-bob). Multi-tenant Postgres backs all banks
# via a `bank_pubkey` column on every row that holds bank-scoped state.
#
# To bring this up locally:
#   supabase login
#   supabase link --project-ref <your-project-ref>
#   supabase secrets set BANK_ALICE_PRIV_KEY=$(bun run scripts/genkey.ts)
#   supabase functions deploy bank-alice
#
# To run locally (no deploy):
#   supabase start
#   supabase functions serve bank-alice --env-file ./supabase/.env.local

project_id = "barter-game"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = false  # v1 uses ed25519 keys, not Supabase Auth

[edge_runtime]
enabled = true
inspector_port = 8083

# Per-function config. Each bank is a distinct function reading its own
# BANK_<NAME>_PRIV_KEY from secrets. Add a [functions.bank-bob] block when
# bank-bob ships in W3.
[functions.bank-alice]
verify_jwt = false  # ed25519 signatures verify on the wire; no JWT layer
